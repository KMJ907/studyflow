<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료 목록 | StudyFlow</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container navbar">

        <a href="index.html" class="logo">
            StudyFlow
        </a>

        <nav>
            <ul>
                <li><a href="index.html">홈</a></li>
                <li><a href="notice.html">공지사항</a></li>
                <li><a href="products.html" class="active">자료</a></li>
                <li><a href="request.html">자료 요청</a></li>
            </ul>
        </nav>

    </div>
</header>

<section class="page-header">

    <div class="container">

        <h1>자료 목록</h1>

        <p>
            다양한 학습 자료를 확인해보세요.
        </p>

    </div>

</section>

<section class="section">

    <div class="container">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="자료명을 검색하세요">

        </div>

        <div class="category-filter">

            <button class="category-btn active"
                    data-category="all">
                전체
            </button>

        </div>

        <div class="sort-box">

            <select id="sortSelect">

                <option value="popular">
                    인기순
                </option>

                <option value="latest">
                    최신순
                </option>

                <option value="name">
                    가나다순
                </option>

            </select>

        </div>

        <div class="board-header">

            <div>자료명</div>

            <div>등록일</div>

        </div>

        <div id="productList"></div>

    </div>

</section>

<footer>

    <div class="container">

        <p>
            © 2026 StudyFlow. All Rights Reserved.
        </p>

    </div>

</footer>

<script src="js/products.js"></script>

</body>
</html>
